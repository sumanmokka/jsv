<!DOCTYPE html>
<html>
<head>
<title>Product Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

input, select, button {
  padding: 8px;
}

/* Grid */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px gray;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: contain;
}

.price {
  background: green;
  color: white;
  padding: 5px;
  border: none;
  margin-top: 5px;
}

.error {
  color: red;
  text-align: center;
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 10% auto;
  width: 300px;
}
</style>

</head>

<body>

<h1>🛒 Product Dashboard</h1>

<div class="controls">
  <input type="text" id="search" placeholder="Search product">
  <select id="category">
    <option value="">All</option>
    <option>electronics</option>
    <option>jewelery</option>
    <option>men's clothing</option>
    <option>women's clothing</option>
  </select>
  <button onclick="sortLow()">Low → High</button>
  <button onclick="sortHigh()">High → Low</button>
</div>

<h3 id="loader">Loading...</h3>
<div id="error" class="error"></div>
<div class="container" id="products"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="mTitle"></h3>
    <p id="mDesc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
let data = [];
let filtered = [];

async function fetchData() {
  try {
    let res = await fetch("https://fakestoreapi.com/products");
    data = await res.json();
    filtered = data;
    document.getElementById("loader").style.display = "none";
    displayData(filtered);
  } catch (e) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("error").innerText = "Error loading data";
  }
}

function displayData(arr) {
  let container = document.getElementById("products");
  container.innerHTML = "";

  arr.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.title.slice(0,20)}</h4>
        <p>${p.description.slice(0,60)}</p>
        <button class="price">₹${p.price}</button>
        <button onclick="viewMore('${p.title}','${p.description}')">View More</button>
      </div>
    `;
  });
}

// Search
document.getElementById("search").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();
  filtered = data.filter(p => p.title.toLowerCase().includes(val));
  displayData(filtered);
});

// Category
document.getElementById("category").addEventListener("change", e => {
  let val = e.target.value;
  filtered = val ? data.filter(p => p.category === val) : data;
  displayData(filtered);
});

// Sorting
function sortLow() {
  filtered.sort((a,b) => a.price - b.price);
  displayData(filtered);
}

function sortHigh() {
  filtered.sort((a,b) => b.price - a.price);
  displayData(filtered);
}

// Modal
function viewMore(title, desc) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("mTitle").innerText = title;
  document.getElementById("mDesc").innerText = desc;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

fetchData();
</script>

</body>
</html>S
